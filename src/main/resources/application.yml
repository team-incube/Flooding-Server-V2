spring:
  application:
    name: flooding-server-v2

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: ${JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

sdk:
  logging:
    enabled: true
    not-logging-urls:
      - "/v3/api-docs/**"
      - "/swagger-ui/**"

  response:
    enabled: true
    not-wrapping-urls:
      - "/v3/api-docs/**"
      - "/v3/api-docs"
      - "/swagger-ui/**"

  swagger:
    enabled: true
    title: "Flooding Server API"
    version: "v2"
    paths-to-match:
      - "/**"

  exception:
    enabled: true
    use-english-message: false

study:
  open-time: "${STUDY_OPEN_TIME:20:00}"
  close-time: "${STUDY_CLOSE_TIME:21:00}"
  max-count: ${STUDY_MAX_COUNT:50}
  lock-key: ${STUDY_LOCK_KEY:study:lock}

massage:
  open-time : "${MASSAGE_OPEN_TIME:20:20}"
  max-count : ${MASSAGE_MAX_COUNT:5}
  lock-key: ${MASSAGE_KEY:lock}

oauth:
  client-id: ${OAUTH_CLIENT_ID}
  client-secret: ${OAUTH_CLIENT_SECRET}

datagsm:
  neis:
    meals:
      api-key: ${DATAGSM_NEIS_MEALS_API_KEY}
      base-url: ${DATAGSM_NEIS_MEALS_BASE_URL:https://api.datagsm.com}
      path: ${DATAGSM_NEIS_MEALS_PATH:/v1/neis/meals}

neis:
  openapi:
    timetable:
      base-url: ${NEIS_TIMETABLE_BASE_URL:https://open.neis.go.kr}
      api-key: ${NEIS_TIMETABLE_API_KEY}
      path: ${NEIS_TIMETABLE_PATH:/hub/hisTimetable}
      data-type: ${NEIS_TIMETABLE_DATA_TYPE:json}
      page-size: ${NEIS_TIMETABLE_PAGE_SIZE:100}

ai:
  server:
    url: ${AI_SERVER_URL}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

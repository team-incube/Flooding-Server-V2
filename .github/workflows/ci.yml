# ─────────────────────────────────────────────────────────────────
# CI Workflow — Flooding-Server-V2
# Triggers  : push (all branches), PR to master/develop
# Secrets   : HARBOR_HOST, HARBOR_USERNAME, HARBOR_PASSWORD
# ─────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master, develop]

env:
  JAVA_VERSION: '24'
  HARBOR_PROJECT: flooding
  IMAGE_NAME: flooding-server-v2

jobs:
  # ── 1. Test ──────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: build/reports/tests/

  # ── 2. Build → Scan → Push ───────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_full: ${{ steps.meta.outputs.full }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build JAR
        run: ./gradlew build -x test --no-daemon

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH=$(echo "${{ github.ref_name }}" | sed 's|/|-|g')
          TAG="${BRANCH}-${SHORT_SHA}"
          FULL="${{ secrets.HARBOR_HOST }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${TAG}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "full=${FULL}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        if: github.ref_name == 'master' || github.ref_name == 'develop'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.full }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push to Harbor
        if: github.ref_name == 'master' || github.ref_name == 'develop'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.full }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Trigger CD (master only) ──────────────────────────────
  trigger-cd:
    name: Trigger CD
    needs: build
    if: github.ref_name == 'master'
    uses: ./.github/workflows/cd.yml
    with:
      image_tag: ${{ needs.build.outputs.image_tag }}
    secrets: inherit

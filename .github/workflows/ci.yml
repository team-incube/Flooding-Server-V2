# ─────────────────────────────────────────────────────────────────
# CI Workflow — Flooding-Server-V2
# Triggers  : push (all branches), PR to master/develop
# Secrets   : HARBOR_HOST, HARBOR_USERNAME, HARBOR_PASSWORD,
#             SLACK_WEBHOOK_URL
# ─────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master, develop]

env:
  JAVA_VERSION: '24'
  HARBOR_PROJECT: flooding
  IMAGE_NAME: flooding-server-v2

jobs:
  # ── 1. Test ──────────────────────────────────────────────────
  test:
    name: Test
    runs-on: [self-hosted, flooding]
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon
        continue-on-error: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: build/reports/tests/

  # ── 2. Build → Scan → Push ───────────────────────────────────
  build:
    name: Build & Push
    runs-on: [self-hosted, flooding]
    needs: test
    if: always()
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_full: ${{ steps.meta.outputs.full }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew build -x test --no-daemon

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH=$(echo "${{ github.ref_name }}" | sed 's|/|-|g')
          TAG="${BRANCH}-${SHORT_SHA}"
          FULL="${{ secrets.HARBOR_HOST }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${TAG}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "full=${FULL}" >> $GITHUB_OUTPUT

      - name: Build image (nerdctl)
        run: |
          sudo nerdctl --address /run/containerd/containerd.sock build \
            --insecure-registry \
            -t "${{ steps.meta.outputs.full }}" \
            .

      - name: Push to Harbor (nerdctl)
        if: github.ref_name == 'master' || github.ref_name == 'develop'
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | \
            sudo nerdctl --address /run/containerd/containerd.sock login \
              --username "${{ secrets.HARBOR_USERNAME }}" \
              --password-stdin \
              "${{ secrets.HARBOR_HOST }}"
          sudo nerdctl --address /run/containerd/containerd.sock push \
            --insecure-registry \
            "${{ steps.meta.outputs.full }}"

  # ── 3. Trigger CD (master only) ──────────────────────────────
  trigger-cd:
    name: Trigger CD
    needs: build
    if: github.ref_name == 'master'
    uses: ./.github/workflows/cd.yml
    with:
      image_tag: ${{ needs.build.outputs.image_tag }}
    secrets: inherit

  # ── 4. Slack notification ────────────────────────────────────
  notify:
    name: Slack Notify
    runs-on: [self-hosted, flooding]
    needs: [test, build]
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "*[CI/CD] Flooding-Server-V2*",
              "attachments": [{
                "color": "${{ (needs.build.result == 'success') && 'good' || 'danger' }}",
                "fields": [
                  { "title": "Status",  "value": "${{ (needs.build.result == 'success') && '✅ SUCCESS' || '❌ FAILED' }}", "short": true },
                  { "title": "Branch",  "value": "${{ github.ref_name }}", "short": true },
                  { "title": "Commit",  "value": "${{ github.sha }}", "short": true },
                  { "title": "Message", "value": "${{ github.event.head_commit.message }}", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

# ─────────────────────────────────────────────────────────────────
# CD Workflow — Flooding-Server-V2
# Triggers  : workflow_call from ci.yml
#             master  → updates values.yaml       → prod (flooding ns)
#             develop → updates values-dev.yaml   → dev  (flooding-dev ns)
# Secrets   : INFRA_REPO_TOKEN
# Effect    : Clones Flooding-DevOps-V2, updates image.tag,
#             commits & pushes → ArgoCD auto-syncs
# ─────────────────────────────────────────────────────────────────
name: CD

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
      environment:
        required: true
        type: string   # 'prod' | 'dev'

jobs:
  deploy:
    name: Update Helm values in DevOps repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DevOps repository
        uses: actions/checkout@v4
        with:
          repository: team-incube/Flooding-DevOps-V2
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          fetch-depth: 0

      - name: Update image tag (prod → values.yaml, dev → values-dev.yaml)
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            VALUES_FILE="helm/flooding-server/values.yaml"
          else
            VALUES_FILE="helm/flooding-server/values-dev.yaml"
          fi
          sed -i "s|^  tag:.*|  tag: \"${{ inputs.image_tag }}\"|" "${VALUES_FILE}"
          echo "Updated ${VALUES_FILE} image.tag to: ${{ inputs.image_tag }}"

      - name: Verify change
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            grep "tag:" helm/flooding-server/values.yaml
          else
            grep "tag:" helm/flooding-server/values-dev.yaml
          fi

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ "${{ inputs.environment }}" = "prod" ]; then
            git add helm/flooding-server/values.yaml
          else
            git add helm/flooding-server/values-dev.yaml
          fi
          git commit -m "chore: update ${{ inputs.environment }} image tag to ${{ inputs.image_tag }} [skip ci]"
          git push

# ─────────────────────────────────────────────────────────────────
# CD Workflow — Flooding-Server-V2
# Triggers  : workflow_call from ci.yml (master branch only)
# Secrets   : INFRA_REPO_TOKEN
# Effect    : Clones Flooding-DevOps-V2, updates image.tag in
#             helm/flooding-server/values.yaml, commits & pushes
#             → ArgoCD auto-syncs from DevOps repo
# ─────────────────────────────────────────────────────────────────
name: CD

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string

jobs:
  deploy:
    name: Update Helm values in DevOps repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DevOps repository
        uses: actions/checkout@v4
        with:
          repository: team-incube/Flooding-DevOps-V2
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          fetch-depth: 0

      - name: Update image tag in values.yaml
        run: |
          sed -i "s|^  tag:.*|  tag: \"${{ inputs.image_tag }}\"|" \
            helm/flooding-server/values.yaml
          echo "Updated image.tag to: ${{ inputs.image_tag }}"

      - name: Verify change
        run: grep "tag:" helm/flooding-server/values.yaml

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/flooding-server/values.yaml
          git commit -m "chore: update image tag to ${{ inputs.image_tag }} [skip ci]"
          git push
